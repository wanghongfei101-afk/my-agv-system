<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>速泊安AGV智能展示平台</title>
    <style>
        :root {
            --primary: #0066ff;
            --accent: #00f2fe;
            --bg: #f8faff;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #1d1d1f;
            --nav-height: 80px;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(0, 102, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 254, 0.05) 0%, transparent 40%);
            margin: 0;
            color: var(--text);
            min-height: 100vh;
        }

        /* 顶部导航栏：增强颜色区分与阴影 */
        .header {
            background: rgba(255, 255, 255, 0.9);
            /* 提高不透明度，增加区分 */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: var(--nav-height);
            border-bottom: 1px solid rgba(0, 102, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            /* 加深投影 */
            display: flex;
            align-items: center;
            /* 导航栏内部整体垂直居中 */
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* 确保所有子元素垂直居中 */
            width: 95%;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
        }

        /* 左侧 Logo 区域 */
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 200px;
            /* 固定宽度，确保不挤压中间标题 */
            cursor: pointer;
        }

        .logo-area img {
            height: 40px;
            width: auto;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .brand-sub {
            font-size: 9px;
            color: #999;
            letter-spacing: 1px;
        }

        /* 中间标题：绝对居中优化 */
        .main-title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--text);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            /* 核心：相对于父级容器绝对水平居中 */
            pointer-events: none;
            white-space: nowrap;
        }

        /* 右侧功能区：搜索框与管理按钮对齐 */
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 400px;
            justify-content: flex-end;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-container input {
            width: 220px;
            padding: 8px 35px 8px 15px;
            border: 1px solid rgba(0, 102, 255, 0.2);
            border-radius: 20px;
            background: white;
            outline: none;
            transition: all 0.3s;
            font-size: 14px;
        }

        .search-container input:focus {
            width: 280px;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 102, 255, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 12px;
            opacity: 0.4;
            font-size: 14px;
        }

        .admin-btn {
            padding: 8px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .admin-btn:hover {
            box-shadow: 0 5px 15px rgba(0, 102, 255, 0.3);
            transform: translateY(-2px);
        }

        /* 产品列表展示区 */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 5%;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 1. 确保基础卡片有平滑过渡动画 */
        /* 修改后的立体感卡片样式 */
        .card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            z-index: 1;

            /* 关键修改：添加明显的边框和多重阴影实现立体感 */
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow:
                0 4px 6px rgba(0, 0, 0, 0.02),
                0 10px 20px rgba(0, 0, 0, 0.05);

            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 增强悬停时的立体反弹感 */
        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            /* 悬停时边框变色 */
            box-shadow:
                0 15px 30px rgba(0, 102, 255, 0.1),
                0 5px 15px rgba(0, 0, 0, 0.08);
        }

        /* 2. 鼠标移入（Hover）效果 */
        .card:hover {
            transform: translateY(-10px);
            /* 向上浮动 */
            box-shadow: 0 15px 35px rgba(0, 102, 255, 0.15);
            /* 更加深邃的蓝色投影 */
        }

        /* 3. 给卡片内的图片也加个缩放效果 */
        .card:hover img {
            transform: scale(1.05);
            /* 图片微微放大 */
            transition: transform 0.4s ease;
        }

        /* 4. 给文字标题加一个科技蓝变色 */
        .card:hover div[style*="text-align:center"] {
            color: var(--primary);
            transition: color 0.3s ease;
        }

        /* 搜索建议列表样式 */
        .suggestions-box {
            position: absolute;
            top: 110%;
            left: 0;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 2000;
        }

        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 14px;
        }

        .suggestion-item:hover {
            background: #f0f7ff;
            color: var(--primary);
        }

        /* 移动端简单处理 */
        @media (max-width: 900px) {
            .main-title {
                display: none;
            }

            .header-right {
                min-width: auto;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-content">
            <div class="logo-area" onclick="location.reload()">
                <img src="images/logo.png" alt="Logo" onerror="this.style.display='none'">
                <div class="logo-text">
                    <span class="brand-name">速泊安</span>
                    <span class="brand-sub">SuperAnt</span>
                </div>
            </div>

            <div class="main-title">AGV产品汇总</div>

            <div class="header-right">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="搜索产品..." onkeyup="handleSearch(event)">
                    <span class="search-icon">🔍</span>
                    <div id="searchSuggestions" class="suggestions-box"></div>
                </div>
                <button class="admin-btn" onclick="location.href='admin.html'">
                    <span>⚙️</span> 系统管理
                </button>
            </div>
        </div>
    </div>

    <div class="container" id="productList">
    </div>

    <script>
        // 权限与数据加载逻辑同前...
        if (sessionStorage.getItem('isLogin') !== 'true') window.location.href = 'login.html';

        let allProducts = [];

        async function loadProducts() {
            const res = await fetch('/api/products');
            allProducts = await res.json();
            renderProducts(allProducts);
        }

        function renderProducts(data) {
            const container = document.getElementById("productList");
            container.innerHTML = "";
            data.forEach(p => {
                const div = document.createElement("div");
                div.className = "card"; // 此处沿用您之前的卡片样式
                // 修改点击事件
                div.onclick = () => {
                    window.location.href = `product.html?id=${p._id}`;
                };
                div.innerHTML = `
                    <img src="${p.img || 'images/default.png'}" style="width:100%; height:200px; object-fit:contain; padding:15px;">
                    <div style="padding:15px; text-align:center; font-weight:bold; border-top:1px solid #eee;">${p.name}</div>
                `;
                container.appendChild(div);
            });
        }

        function handleSearch(event) {
            const keyword = event.target.value.trim().toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(keyword));
            renderProducts(filtered);
        }

        loadProducts();
    </script>
</body>

</html>
